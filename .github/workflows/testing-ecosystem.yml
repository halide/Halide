name: Ecosystem
on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - '**.h'
      - '**.c'
      - '**.cpp'
      - 'CMakeLists.txt'
      - '**.cmake'
      - '.github/workflows/testing-ecosystem.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  LLVM_VERSION: 22

jobs:
  check_clang_tidy:
    if: "!contains(github.event.pull_request.labels.*.name, 'skip_buildbots')"
    name: CMake configure (simple vcpkg workflow)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Configure with vcpkg
        run: |
          # Install uv like a user would
          curl -LsSf https://astral.sh/uv/install.sh | sh
          
          # Install vcpkg like a user would
          git clone https://github.com/microsoft/vcpkg.git
          (cd vcpkg && ./bootstrap-vcpkg.sh -disableMetrics)
          export VCPKG_ROOT="$PWD/vcpkg" 
          
          # Get LLVM from Halide's PyPI index, plus ninja/cmake
          uv sync --no-install-project --group ci-llvm-22
          source .venv/bin/activate
          
          # Configure Halide with vcpkg, pointing to the LLVM we just installed
          cmake --preset release-vcpkg -DHalide_LLVM_ROOT="$(halide-llvm)"
