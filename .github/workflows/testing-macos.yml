name: macOS

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths-ignore:
      - "doc/**"
      - "README.md"
      - "CODE_OF_CONDUCT.md"
      - "LICENSE.txt"
      - ".gitignore"
      - ".gitattributes"
      - ".gitmodules"
      - ".lldbinit"
      - ".github/**"
      - "!.github/workflows/testing-macos.yml"
      - "packaging/**"
      - "Makefile"
      - "Makefile.inc"
      - 'run-clang-tidy.sh'
      - '**.clang-tidy'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    if: "!contains(github.event.pull_request.labels.*.name, 'skip_buildbots')"
    name: arm-64 / coverage
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v7

      - name: Install coverage dependencies
        run: brew install llvm@21 lld@21 emscripten flatbuffers wabt

      - name: Run coverage suite
        run: tools/run-coverage.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: build/macOS-coverage/coverage.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  macos:
    if: "!contains(github.event.pull_request.labels.*.name, 'skip_buildbots')"
    name: ${{ matrix.arch }} / ${{ matrix.uv_group }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Disable extra cases until we have a fuller workflow
        # For now, we're only testing HelloiOS
        uv_group: [ "ci-llvm-main", ] # "ci-llvm-22", "ci-llvm-21"
        runner: [ "macos-26", ] # "macos-26-intel"
        include:
          - runner: macos-26
            arch: arm-64
            python: cpython-3.10.20-macos-aarch64-none

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Sync CI environment
        run: |
          uv sync --python '${{ matrix.python }}' --group '${{ matrix.uv_group }}' --no-install-project
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=${GITHUB_WORKSPACE}/.venv" >> "$GITHUB_ENV"

      - name: Configure LLVM paths
        run: echo "Halide_LLVM_ROOT=$(halide-llvm --prefix)" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: >-
          cmake --preset ci-macos-${{ matrix.arch }}
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"
          -DWITH_TESTS=NO
          -DWITH_UTILS=NO
          -DWITH_TUTORIALS=NO
          -DWITH_PYTHON_BINDINGS=NO

      - name: Initial build
        run: cmake --build build --target install

      - name: Configure HelloiOS
        run: ./setup.sh
        working-directory: apps/HelloiOS
        env:
          Halide_ROOT: ${{ github.workspace }}/install

      - name: Build HelloiOS
        run: >-
          xcodebuild -workspace HelloiOS.xcworkspace
          -scheme HelloiOS
          -configuration Debug
          -destination 'generic/platform=iOS Simulator'
          build
        working-directory: apps/HelloiOS

  webgpu:
    if: "!contains(github.event.pull_request.labels.*.name, 'skip_buildbots')"
    name: arm-64 / host-webgpu
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Sync CI environment
        run: |
          uv sync --python 'cpython-3.10.20-macos-aarch64-none' --group ci-llvm-main --no-install-project
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=${GITHUB_WORKSPACE}/.venv" >> "$GITHUB_ENV"

      - name: Configure LLVM paths
        run: echo "Halide_LLVM_ROOT=$(halide-llvm --prefix)" >> "$GITHUB_ENV"

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-archives-macos-arm64-webgpu-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/vcpkg-triplets/arm64-osx-halide.cmake', 'cmake/vcpkg-ports/**') }}

      - name: Configure CMake
        run: cmake --preset ci-macos-arm-64-webgpu -DHalide_TARGET=host-webgpu

      - name: Build
        run: cmake --build build

      - name: Test (host-webgpu)
        run: ctest --test-dir build --output-on-failure -j "$(sysctl -n hw.ncpu)" -R correctness_gpu
        env:
          # CMake's find_package resolves Dawn fine at configure/build time, but the
          # JIT's runtime dlopen (JITModule.cpp's load_webgpu) is a separate lookup
          # that needs to be told explicitly where the vcpkg-installed dylib lives.
          HL_WEBGPU_NATIVE_LIB: ${{ github.workspace }}/build/vcpkg_installed/arm64-osx-halide/lib/libwebgpu_dawn.dylib
