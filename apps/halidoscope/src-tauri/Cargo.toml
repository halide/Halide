[package]
name = "halidoscope"
version = "0.1.0"
description = "An interactive visualizer for Halide traces."
authors = ["Parker Ziegler <pziegler@adobe.com>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "halidoscope_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
colorous = "1.0.16"
comfy-table = "7"

[target."cfg(not(any(target_os = \"android\", target_os = \"ios\")))".dependencies]
tauri-plugin-cli = "2.0.0"

# `tauri dev` builds with the dev profile, whose default opt-level = 0 leaves the
# trace parser (a tight binary loop over millions of packets) badly unoptimized
# — multi-minute loads on large traces. Optimize codegen while keeping fast
# incremental builds and debuggability.
[profile.dev]
opt-level = 3

# Dependencies are compiled once and cached, so always optimize them fully.
[profile.dev.package."*"]
opt-level = 3
