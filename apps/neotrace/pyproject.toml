[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "neotrace"
version = "0.1.0"
description = "Interactive trace visualization for Halide"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
  "PySide6>=6.5",
  "graphviz>=0.20",
  "halide",
  "imageio[ffmpeg]>=2.31",
  "numpy>=1.24",
  "tqdm>=4.67.1",
]

[dependency-groups]
dev = ["pytest>=9.0.2", "pyyaml>=6.0.0", "ruff>=0.14.13"]


[project.scripts]
neotrace = "neotrace.__main__:main"

[tool.ruff]
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["B905"]                          # zip strictness

[tool.uv.sources]
halide = { path = "../.." }
imageio = { index = "piwheels", marker = "platform_machine == 'armv8l' or platform_machine == 'armv7l'" }
numpy = { index = "piwheels", marker = "platform_machine == 'armv8l' or platform_machine == 'armv7l'" }

[[tool.uv.index]]
name = "piwheels"
url = "https://piwheels.org/simple"
explicit = true

[tool.hatch.build.targets.wheel]
packages = ["neotrace"]
